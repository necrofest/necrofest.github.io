<!doctype html>
<html lang="pl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CTCG – Mapa Sklepów</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../colors.css">
	<link rel="stylesheet" href="../map_style.css">
</head>

<body>
	<header>
		<div class="logo-box">
			<a href="/ctcg"><img src="../images/logo.webp" alt="" class="logo-img" /></a>
		</div>
		<div style="display: flex; flex-direction: column; gap: 2px">
			<div style="
						font-size: 0.7rem;
						color: #6e7a9a;
						letter-spacing: 2px;
					">
				MAPA SKLEPÓW
			</div>
			<div class="store-count" id="store-count"></div>
		</div>
		<button id="theme-toggle" onclick="document.body.classList.toggle('dark-mode')">
			<img src="../images/Light_Dark_Mode_Icon.png" alt="">
		</button>
		<div class="header-sub">POLSKIE COMMUNITY CYBERPUNK TCG //</div>
	</header>

	<div id="map"></div>

<script>
	const map = L.map("map", {
		center: [52.0, 19.5],
		zoom: 7,
		zoomControl: true,
	});
 
	L.tileLayer(
		"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
		{
			attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
			maxZoom: 19,
		},
	).addTo(map);
 
	function createIcon() {
		const svg = `
		<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40">
			<polygon points="16,38 4,20 4,10 16,2 28,10 28,20" fill="#0a0f1e" stroke="#f5e642" stroke-width="1.5"/>
			<polygon points="16,34 6,19 6,11 16,5 26,11 26,19" fill="#f5e642" opacity="0.08"/>
			<circle cx="16" cy="17" r="5" fill="none" stroke="#f5e642" stroke-width="1.5"/>
			<circle cx="16" cy="17" r="2" fill="#f5e642"/>
			<line x1="16" y1="12" x2="16" y2="9" stroke="#f5e642" stroke-width="1"/>
			<line x1="16" y1="22" x2="16" y2="25" stroke="#f5e642" stroke-width="1"/>
			<line x1="11" y1="17" x2="8" y2="17" stroke="#f5e642" stroke-width="1"/>
			<line x1="21" y1="17" x2="24" y2="17" stroke="#f5e642" stroke-width="1"/>
		</svg>`;
		return L.divIcon({
			html: `<div class="custom-marker"><div class="marker-svg">${svg}</div></div>`,
			iconSize: [32, 40],
			iconAnchor: [16, 38],
			popupAnchor: [0, -38],
			className: "",
		});
	}
 
	const icon = createIcon();
 
	function addMarkers(sklepy) {
		const cluster = L.markerClusterGroup();

		sklepy.forEach((s) => {
			const popup = `
			<div class="popup-inner">
				<div class="popup-tag">// SKLEP TCG</div>
				<div class="popup-name">${s.name}</div>
				<div class="popup-divider"></div>
				<div class="popup-address">
					<strong>ADRES</strong>
					${s.address}
				</div>
			</div>`;

			const marker = L.marker([s.lat, s.lon], { icon })
				.bindPopup(popup, { maxWidth: 280 });

			marker.on("popupopen", () => marker.getElement().classList.add("marker-active"));
			marker.on("popupclose", () => marker.getElement().classList.remove("marker-active"));

			cluster.addLayer(marker);
		});

		map.addLayer(cluster);

		document.getElementById("store-count").textContent =
			sklepy.length + (sklepy.length === 1 ? " LOKALIZACJA" : " LOKALIZACJE");
}
 
	fetch("https://grid.arasaka.pl/getShops")
		.then(r => r.json())
		.then(sklepy => {
			addMarkers(sklepy);
			console.log(sklepy)
		});
</script>
</body>

</html>
